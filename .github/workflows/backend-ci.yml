name: Backend CI

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  laravel-tests:
    name: Laravel Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: infrawatch_testing
          POSTGRES_USER: infrawatch_user
          POSTGRES_PASSWORD: infrawatch_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U infrawatch_user -d infrawatch_testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: testing
      APP_DEBUG: true
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: infrawatch_testing
      DB_USERNAME: infrawatch_user
      DB_PASSWORD: infrawatch_password
      TELEGRAM_ENABLED: false
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_pgsql, pgsql, bcmath, xml, ctype, fileinfo, tokenizer
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Clear Laravel cache
        run: php artisan optimize:clear

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

      - name: Check registered routes
        run: php artisan route:list
